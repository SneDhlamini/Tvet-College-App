<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maluti TVET College</title>

    <!--
      Google Fonts:
      - "Playfair Display" → display/heading font (editorial, authoritative)
      - "DM Sans" → body font (clean, modern, readable)
      These are loaded here so they're available globally across all CSS files.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      React mounts the entire application here.
      Nothing else goes in <body> — React owns this div.
    -->
    <div id="root"></div>
  </body>
</html>
